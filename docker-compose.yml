version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: bso-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass devpassword
    networks:
      - bso-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  webapp:
    build: .
    container_name: bso-webapp
    ports:
      - "8081:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: devpassword
    volumes:
      - ./main.php:/var/www/html/main.php
      - ./helpers.php:/var/www/html/helpers.php
      - ./styles.css:/var/www/html/styles.css
      - ./script.js:/var/www/html/script.js
      - ./templates:/var/www/html/templates
    networks:
      - bso-network
    depends_on:
      redis:
        condition: service_healthy

networks:
  bso-network:
    driver: bridge
